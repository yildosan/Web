<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Bloom AI</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Source+Serif+4:ital@1&display=swap" rel="stylesheet">

<style>
:root {
  --radius: 1rem;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* MAIN LAYER */
.main {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

.left {
  width: 100%;
  padding: 20px;
}

.right {
  display: none;
}

@media(min-width: 1024px) {
  .left { width: 52%; }
  .right {
    display: flex;
    width: 48%;
    flex-direction: column;
    padding: 20px;
  }
}

/* LOGO */
.logo {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
}

/* GLASS */
.liquid-glass {
  backdrop-filter: blur(4px);
  background: rgba(255,255,255,0.02);
  position: relative;
  overflow: hidden;
  border-radius: 999px;
}

.liquid-glass-strong {
  backdrop-filter: blur(50px);
  background: rgba(255,255,255,0.03);
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
}

.liquid-glass::before,
.liquid-glass-strong::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 1.5px;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.4),
    rgba(255,255,255,0.15),
    transparent,
    transparent,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.4)
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 20px;
  font-weight: 500;
}

.menu-btn {
  padding: 10px 20px;
  cursor: pointer;
}

/* HERO */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  max-width: 700px;
  letter-spacing: -1px;
}

@media(min-width:1024px){
  .hero h1 {
    font-size: 70px;
  }
}

.hero em {
  font-family: 'Source Serif 4', serif;
  opacity: 0.8;
}

.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.pills {
  display: flex;
  gap: 10px;
  margin-top: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.pill {
  padding: 8px 16px;
  font-size: 12px;
}

/* QUOTE */
.quote {
  margin-top: 40px;
  text-align: center;
  opacity: 0.8;
}

.quote small {
  letter-spacing: 2px;
  opacity: 0.6;
}

.quote p {
  margin: 10px 0;
  font-style: italic;
}

/* RIGHT SIDE */
.topbar {
  display: flex;
  justify-content: space-between;
}

.icons {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.icon {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}

.card {
  padding: 20px;
  margin-top: 20px;
}

.bottom {
  margin-top: auto;
}

.row {
  display: flex;
  gap: 15px;
}

.small-card {
  flex: 1;
  padding: 20px;
}

/* HOVER */
.liquid-glass,
.liquid-glass-strong {
  transition: transform 0.3s;
}

.liquid-glass:hover,
.liquid-glass-strong:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260315_073750_51473149-4350-4920-ae24-c8214286f323.mp4">
</video>

<div class="main">
<div class="container">

<!-- LEFT -->
<div class="left">

<div class="liquid-glass-strong" style="padding:30px; height:100%; border-radius:30px;">

<div class="nav">
  <div class="brand">
    <div class="logo"></div>
    bloom
  </div>

  <div class="menu-btn liquid-glass">Menü</div>
</div>

<div class="hero">
  <div class="logo" style="width:80px;height:80px;"></div>

  <h1>
    Bloom AI ile doğanın <em>ruhunu</em> yeniden tasarla
  </h1>

  <div class="btn liquid-glass-strong">
    Keşfet
  </div>

  <div class="pills">
    <div class="pill liquid-glass">Sanatsal Galeri</div>
    <div class="pill liquid-glass">AI Üretim</div>
    <div class="pill liquid-glass">3D Yapılar</div>
  </div>

  <div class="quote">
    <small>VİZYONER TASARIM</small>
    <p>“Sonu olmayan bir dünya hayal ettik.”</p>
    <small>— MARCUS AURELIO</small>
  </div>
</div>

</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="topbar">
  <div class="icons liquid-glass">
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
  </div>

  <div class="liquid-glass" style="padding:10px 20px;">
    Hesap
  </div>
</div>

<div class="card liquid-glass">
  <h3>Ekosistemimize katıl</h3>
  <p>Topluluğa gir ve üretmeye başla</p>
</div>

<div class="bottom liquid-glass-strong" style="padding:20px; border-radius:40px;">
  
  <div class="row">
    <div class="small-card liquid-glass">
      İşleme
    </div>
    <div class="small-card liquid-glass">
      Arşiv
    </div>
  </div>

  <div class="card liquid-glass" style="margin-top:15px;">
    Gelişmiş Bitki Tasarımı
  </div>

</div>

</div>

</div>
</div>

</body>
</html>
